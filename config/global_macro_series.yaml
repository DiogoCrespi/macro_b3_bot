  # ── Climate / ENSO (NOAA) ────────────────────────────────────────────────
  - source: NOAA
    series_code: "NINO34"
    indicator: "Niño 3.4 Sea Surface Temperature Anomaly"
    geography: [GLOBAL]
    frequency: MONTHLY
    unit: "°C"
    event_family: ENSO_PHASE_CHANGE
