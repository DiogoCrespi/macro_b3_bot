    indicator: "US Unemployment Rate"
    geography: [US]
    frequency: MONTHLY
    unit: "%"
    event_family: GROWTH_SURPRISE
    lookback_days: 1825

  # ── Energy (EIA) ─────────────────────────────────────────────────────────
  - source: EIA
    series_code: "PET.RWTC.D"
    indicator: "WTI Crude Oil Price"
    geography: [US, GLOBAL]
